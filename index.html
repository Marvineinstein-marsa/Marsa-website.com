html{scroll-behavior:smooth}
body{background:var(--void);color:var(--text);font-family:var(--fb);min-height:100vh;overflow-x:hidden}

@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:.9}}
@keyframes fadein{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes gridflow{0%{background-position:0 0}100%{background-position:0 60px}}
@keyframes pulse{0%,100%{box-shadow:0 0 10px rgba(14,165,233,.3)}50%{box-shadow:0 0 30px rgba(14,165,233,.7)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slidein{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.fadein{animation:fadein .5s ease forwards}
h1,h2,h3,h4{font-family:var(--fh);letter-spacing:.05em}
a{color:var(--accent);text-decoration:none}
input,textarea,select{background:rgba(14,165,233,.05);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--fb);font-size:.9rem;padding:10px 14px;width:100%;outline:none;transition:var(--tr)}
input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(14,165,233,.15)}
input::placeholder,textarea::placeholder{color:var(--dim)}
select option{background:var(--panel)}
label{display:block;font-size:.72rem;font-family:var(--fh);letter-spacing:.1em;color:var(--muted);margin-bottom:5px;text-transform:uppercase}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:var(--r);cursor:pointer;font-family:var(--fh);font-weight:600;letter-spacing:.12em;text-transform:uppercase;transition:var(--tr)}
.btn-p{background:linear-gradient(135deg,#0ea5e9,#0055bb);color:#fff;padding:11px 26px;font-size:.7rem}
.btn-p:hover{transform:translateY(-2px);box-shadow:var(--glow)}
.btn-o{background:transparent;color:var(--accent);border:1px solid var(--accent);padding:10px 25px;font-size:.7rem}
.btn-o:hover{background:rgba(14,165,233,.1);box-shadow:var(--glow);transform:translateY(-2px)}
.btn-g{background:transparent;color:var(--muted);border:none;padding:7px 14px;font-size:.82rem;font-family:var(--fb);cursor:pointer;border-radius:var(--r);transition:var(--tr)}
.btn-g:hover{color:var(--accent);background:rgba(14,165,233,.05)}
.card{background:rgba(6,15,30,.85);border:1px solid var(--border);border-radius:12px;backdrop-filter:blur(10px);transition:var(--tr)}
.card:hover{border-color:rgba(14,165,233,.4);box-shadow:0 4px 24px rgba(14,165,233,.1)}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.6rem;font-family:var(--fh);letter-spacing:.1em;text-transform:uppercase;font-weight:700}
.t-b{background:rgba(14,165,233,.12);color:var(--accent);border:1px solid rgba(14,165,233,.3)}
.t-g{background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.3)}

.t-o{background:rgba(255,107,53,.12);color:var(--orange);border:1px solid rgba(255,107,53,.3)}

.sec-title::after{content:'';display:block;height:2px;background:linear-gradient(90deg,var(--accent),transparent);margin-top:5px}
@media(max-width:768px){.hm{display:none!important}.mf{width:100%!important}}
@media(min-width:769px){.hd{display:none!important}}

const cartR=(s,a)=>{
  if(a.t==="ADD"){const e=s.find(i=>i.id===a.item.id);return e?s.map(i=>i.id===a.item.id?{...i,qty:i.qty+(a.qty||1)}:i):[...s,{...a.item,qty:a.qty||1}]}
  if(a.t==="REMOVE")return s.filter(i=>i.id!==a.id);
  if(a.t==="QTY")return s.map(i=>i.id===a.id?{...i,qty:Math.max(1,a.qty)}:i);
  if(a.t==="CLEAR")return[];
  return s;
};

function SearchPage({prods,cartD,wish,toggleWish,setDP,go}){
  const [q,setQ]=useState("");
  const res=q.length>1?prods.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())||p.desc.toLowerCase().includes(q.toLowerCase())||p.cat.toLowerCase().includes(q.toLowerCase())):[];
  return <div style={{maxWidth:1000,margin:"0 auto",padding:"100px 24px 60px"}}>
    <h1 className="sec-title" style={{marginBottom:22}}>🔍 SEARCH</h1>
    <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search products, categories…" style={{marginBottom:28,fontSize:"1rem",padding:"13px 17px"}} autoFocus/>
    {q.length>1&&<p style={{color:"var(--muted)",marginBottom:18,fontSize:".82rem"}}>{res.length} results for "{q}"</p>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:18}}>
      {res.map(p=><PCard key={p.id} p={p} onAdd={(p,q)=>cartD({t:"ADD",item:p,qty:q})} onDetail={p=>{setDP(p);go("product")}} wish={wish} toggleWish={toggleWish}/>)}
    </div>
  </div>;
}

/* ── CAT PAGE ── */
function CatPage({title,icon,cats,prods,cartD,wish,toggleWish,setDP,go}){
  const list=prods.filter(p=>Array.isArray(cats)?cats.includes(p.cat):p.cat===cats);
  return <div style={{maxWidth:1200,margin:"0 auto",padding:"100px 24px 60px"}}>
    <div style={{marginBottom:36}}>
      <div style={{display:"flex",alignItems:"center",gap:11,marginBottom:9}}>
        <span style={{fontSize:"2.2rem"}}>{icon}</span>
        <h1 className="sec-title" style={{fontSize:"clamp(1.2rem,4vw,1.9rem)"}}>{title}</h1>
      </div>
      <p style={{color:"var(--dim)",fontSize:".78rem"}}>{list.length} products</p>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(225px,1fr))",gap:18}}>
      {list.map(p=><PCard key={p.id} p={p} onAdd={(p,q)=>cartD({t:"ADD",item:p,qty:q})} onDetail={p=>{setDP(p);go("product")}} wish={wish} toggleWish={toggleWish}/>)}
    </div>
    {list.length===0&&<div style={{textAlign:"center",padding:60,color:"var(--muted)"}}><div style={{fontSize:"3rem"}}>🔭</div><div style={{marginTop:12,fontFamily:"var(--fh)"}}>No products yet</div></div>}
  </div>;
}

/* ── FOOTER ── */
function Footer({go}){
  return <footer style={{background:"var(--panel)",borderTop:"1px solid var(--border)",padding:"52px 24px 28px"}}>
    <div style={{maxWidth:1200,margin:"0 auto"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:36,marginBottom:36}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:14}}><span style={{fontSize:"1.4rem"}}>🛸</span><span style={{fontFamily:"var(--fh)",fontSize:".92rem",color:"var(--accent)",letterSpacing:".15em"}}>MARSA</span></div>
          <p style={{fontSize:".8rem",color:"var(--muted)",lineHeight:1.75,marginBottom:14}}>Maron Space Agency — Science, Technology and Innovation for the Future.</p>
        </div>
        {[["SHOP",[["shop","All Products"],["drones","Drones"],["robotics","Robotics"],["electronics","Electronics"],["energy","Energy Systems"]]],["COMPANY",[["about","About MARSA"],["contact","Contact"],["innovation","Innovation"],["diy","DIY Science"]]],["CONTACT",[]]].map(([title,links])=>
          <div key={title}>
            <h4 style={{fontFamily:"var(--fh)",fontSize:".68rem",letterSpacing:".14em",color:"var(--muted)",marginBottom:13}}>{title}</h4>
            {title==="CONTACT"?<div style={{fontSize:".8rem",color:"var(--muted)",lineHeight:2}}>
              <div>📧 einsteinmarvin256@gmail.com</div><div>📞 0706651038</div><div>🌍 Uganda, East Africa</div>
            </div>:links.map(([pg,lb])=><button key={lb} onClick={()=>go(pg)} className="btn-g" style={{display:"block",textAlign:"left",fontSize:".8rem",padding:"3px 0",width:"auto"}}>{lb}</button>)}
          </div>
        )}
      </div>
      <div style={{borderTop:"1px solid var(--border)",paddingTop:20,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:10,fontSize:".72rem",color:"var(--dim)"}}>
        <span>© 2025 MARSA — Maron Space Agency. All rights reserved.</span>
        <span style={{fontFamily:"var(--fm)"}}>Built with ⚡ for the future of innovation</span>
      </div>
    </div>
  </footer>;
}

/* ── APP ── */
function App(){
  const [page,setPage]=useState("home");
  const [cart,cartD]=useReducer(cartR,[]);
  const [wish,setWish]=useState([]);
  const [user,setUser]=useState(null);
  const [prods,setProds]=useState(PRODS);
  const [orders]=useState(ORDERS_DATA);
  const [dp,setDP]=useState(null);
  const [toast,setToast]=useState("");

  const go=useCallback(pg=>{setPage(pg);window.scrollTo({top:0,behavior:"smooth"})},[]);

  const toggleWish=id=>{
    setWish(w=>w.includes(id)?w.filter(x=>x!==id):[...w,id]);
    setToast(wish.includes(id)?"Removed from wishlist":"Added to wishlist ❤️");
    setTimeout(()=>setToast(""),2000);
  };
  const wCartD=a=>{
    cartD(a);
    if(a.t==="ADD"){setToast("Added to cart! 🛒");setTimeout(()=>setToast(""),2000);}
  };

  const cp={prods,go,cartD:wCartD,wish,toggleWish,setDP};
  const catMap={
    innovation:{title:"Innovation Projects",icon:"🚀",cats:"Innovation Projects"},
    electronics:{title:"Electronics & DIY",icon:"💡",cats:["Electronics","DIY Technology"]},
    robotics:{title:"Robotics",icon:"🤖",cats:"Robotics"},
    drones:{title:"Drone Technology",icon:"🛸",cats:"Drones"},
    energy:{title:"Energy & Power Systems",icon:"⚡",cats:"Energy Systems"},
    diy:{title:"DIY Science",icon:"🔧",cats:"DIY Technology"},
  };

  const render=()=>{
    if(page in catMap){const c=catMap[page];return <CatPage {...cp} title={c.title} icon={c.icon} cats={c.cats}/>;}
    switch(page){
      case "home":return <HomePage {...cp}/>;
      case "shop":return <ShopPage {...cp}/>;
      case "product":return <ProductDetail p={dp} cartD={wCartD} wish={wish} toggleWish={toggleWish} go={go}/>;
      case "cart":return <CartPage cart={cart} cartD={cartD} go={go}/>;
      case "checkout":return <CheckoutPage cart={cart} cartD={cartD} go={go}/>;
      case "login":return <AuthPage setUser={setUser} go={go}/>;
      case "account":return <AccountPage user={user} setUser={setUser} go={go}/>;
      case "admin":return <AdminPage prods={prods} setProds={setProds} orders={orders} user={user} go={go}/>;
      case "about":return <AboutPage/>;
      case "contact":return <ContactPage/>;
      case "wishlist":return <WishlistPage {...cp}/>;
      case "search":return <SearchPage {...cp}/>;
      default:return <HomePage {...cp}/>;
    }
  };

  return <div style={{minHeight:"100vh",position:"relative"}}>
    <Stars/>
    <div style={{position:"relative",zIndex:1}}>
      <Nav page={page} go={go} cartN={cart.reduce((s,i)=>s+i.qty,0)} user={user} setUser={setUser}/>
      <main>{render()}</main>
      {!["checkout","login"].includes(page)&&<Footer go={go}/>}
    </div>
    <Toast msg={toast}/>
  </div>;
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
